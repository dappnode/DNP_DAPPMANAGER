version: "2"
fields:
  - id: payoutAddress
    target:
      type: environment
      name: PAYOUT_ADDRESS
      # service: [my-package]   # only for multi-service packages
    title: Payout address
    description: Ethereum address that will receive rewards
    pattern: "^0x[a-fA-F0-9]{40}$"
    patternErrorMessage: Must be a valid Ethereum address
    required: true

  - id: httpPort
    target:
      type: portMapping
      containerPort: "8080"
    title: HTTP port
    description: Host port to expose the HTTP endpoint on

  - id: dataMountpoint
    target:
      type: namedVolumeMountpoint
      volumeName: data
    title: Data location
    description: Disk where the package stores its data

  - id: configFile
    target:
      type: fileUpload
      path: /usr/src/app/config.json
      # service: my-package      # only for multi-service packages
    title: Config file
    description: Optional config file to upload into the container
